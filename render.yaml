services:
  - type: web
    name: ai-job-apply-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      # ── App ───────────────────────────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true         # Render auto-generates a secure random value

      # ── Skip DB wait (Neon is a remote managed service, always available) ─────
      - key: SKIP_DB_WAIT
        value: "true"

      # ── Database (Neon) ───────────────────────────────────────────────────────
      # Paste the Neon connection string from your project dashboard.
      # Format: postgresql+asyncpg://user:pass@host/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Google OAuth 2.0 ─────────────────────────────────────────────────────
      # Create credentials at https://console.cloud.google.com/apis/credentials
      # Add https://<your-render-service>.onrender.com/api/v1/auth/google/callback
      # as an authorised redirect URI.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false                 # e.g. https://ai-job-apply-api.onrender.com/api/v1/auth/google/callback

      # ── JWT (RS256) ───────────────────────────────────────────────────────────
      # Generate locally then base64-encode (no newlines):
      #   openssl genrsa -out secrets/private.pem 2048
      #   openssl rsa -in secrets/private.pem -pubout -out secrets/public.pem
      #   export JWT_PRIVATE_KEY=$(base64 secrets/private.pem | tr -d '\n')
      #   export JWT_PUBLIC_KEY=$(base64 secrets/public.pem | tr -d '\n')
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false

      # ── Gmail token encryption ────────────────────────────────────────────────
      # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: GMAIL_TOKEN_ENCRYPTION_KEY
        sync: false

      # ── AI (Gemini) ───────────────────────────────────────────────────────────
      # Get a free key at https://aistudio.google.com/app/apikey
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

      # ── Storage ───────────────────────────────────────────────────────────────
      # /tmp persists for the life of the process; files are lost on redeploy.
      # Acceptable for MVP — users re-upload after a deploy.
      - key: RESUME_STORAGE_PATH
        value: /tmp/storage/resumes

      # ── CORS ──────────────────────────────────────────────────────────────────
      # Space-separated: add your Chrome extension's origin after loading unpacked.
      # e.g. chrome-extension://abcdefghijklmnopqrstuvwxyz012345
      - key: CORS_ALLOWED_ORIGINS
        sync: false
