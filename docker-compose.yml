services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aijobapply}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aijobapply}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV:      ${APP_ENV:-development}
      APP_VERSION:  ${APP_VERSION:-1.0.0}
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}
      # Required — set in root .env (copy from .env.example)
      SECRET_KEY:   ${SECRET_KEY:-dev-secret-key-CHANGE-IN-PRODUCTION}

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-aijobapply}

      # JWT — keys are mounted from ./backend/secrets/ (see volumes below)
      JWT_PRIVATE_KEY_PATH: /app/secrets/private.pem
      JWT_PUBLIC_KEY_PATH:  /app/secrets/public.pem

      # Google OAuth
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:  ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}

      # AI
      AI_PROVIDER:     ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY:  ${GEMINI_API_KEY:-}
      GEMINI_MODEL:    ${GEMINI_MODEL:-gemini-2.0-flash}
      GROQ_API_KEY:    ${GROQ_API_KEY:-}
      GROQ_MODEL:      ${GROQ_MODEL:-llama-3.3-70b-versatile}

      # Gmail token encryption (Fernet key)
      GMAIL_TOKEN_ENCRYPTION_KEY: ${GMAIL_TOKEN_ENCRYPTION_KEY:-}

      # CORS — space-separated: include the chrome-extension:// origin after loading
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}

      # Resume storage (absolute path so DB records are unambiguous)
      RESUME_STORAGE_PATH: /app/storage/resumes

      # Passed to wait-for-db.sh
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      # JWT PEM files — generated once with: cd backend && bash scripts/generate_jwt_keys.sh
      - ./backend/secrets:/app/secrets:ro
      # Resume PDFs — persisted across container restarts
      - resume_storage:/app/storage/resumes
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    name: aijobapply_postgres_data
  resume_storage:
    name: aijobapply_resume_storage
