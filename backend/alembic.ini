[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# The real URL is read from settings in env.py — this placeholder satisfies the
# alembic CLI parser when DATABASE_URL is not needed (e.g. --help, offline mode).
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost/aijobapply

[post_write_hooks]
# Format new migration files with ruff after generation.
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = --fix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
